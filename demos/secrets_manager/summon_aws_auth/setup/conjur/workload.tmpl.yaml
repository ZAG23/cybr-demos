# metadata
# mode: append-policy
---
- !policy
  id: {{ .LAB_ID }}
  body:
  - !host
    id: {{ .AWS_ACCOUNT_ID }}/{{ .AWS_ROLE_NAME }}
    annotations:
      description: Summon AWS IAM workload

- !grant
  roles:
    - !group vault/{{ .SAFE_NAME }}/delegation/consumers
  members:
    - !host /data/{{ .LAB_ID }}/{{ .AWS_ACCOUNT_ID }}/{{ .AWS_ROLE_NAME }}
