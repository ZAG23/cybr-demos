# metadata
# mode: append-policy
---
# Identity for the application example that uses the authenticator
# It annotates the host identity to grants it the role to authenticate
- !policy
  id: poc-workloads
  body:
  - !host
    id: {{ .JWT_CLAIM_IDENTITY_VALUE }}
    annotations:
      authn-jwt/poc-k8s/sub: {{ .JWT_CLAIM_IDENTITY_VALUE }}
      authn/api-key: true


