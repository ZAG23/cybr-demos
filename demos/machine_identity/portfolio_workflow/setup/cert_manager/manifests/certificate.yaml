apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{NAMESPACE}}-cert
  namespace: {{NAMESPACE}}
spec:
  secretName: {{SECRET_NAME}}
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  commonName: {{COMMON_NAME}}
  dnsNames:
    - {{COMMON_NAME}}
  issuerRef:
    name: cyberark-issuer
    kind: Issuer
    group: cert-manager.io
