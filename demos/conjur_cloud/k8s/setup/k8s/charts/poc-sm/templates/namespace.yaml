---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sm-configmap
  namespace: {{ .Values.namespace }}
data:
  CONJUR_ACCOUNT: "{{ .Values.sm_account }}"
  CONJUR_APPLIANCE_URL: "https://{{ .Values.sm_fqdn }}/api"
  CONJUR_AUTHN_URL: "https://{{ .Values.sm_fqdn }}/api/authn-jwt/{{ .Values.sm_authn_id }}"
  AUTHENTICATOR_ID: "{{ .Values.sm_authn_id }}"
  CONJUR_VERSION: "5"
  CONJUR_SSL_CERTIFICATE: {{ .Values.sm_cert_b64 | b64dec | quote }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.sm_app_service_account }}
  namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-access
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: [ "get", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: {{ .Values.namespace }}
  name: secrets-access-binding
subjects:
  - kind: ServiceAccount
    namespace: {{ .Values.namespace }}
    name: {{ .Values.sm_app_service_account }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: secrets-access
